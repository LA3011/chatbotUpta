<div class="page-background">
  <div class="chat-wrapper">
    <header class="chat-header">
      <div class="header-left">
        <button class="back-btn" (click)="goBack()" title="Volver al inicio">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
          </svg>
        </button>

        <div class="bot-info-group">
          <div class="avatar-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHB8160i2vCZfwl2SbTquWx2JZXzpOaLCc_Q&s" alt="Bot Avatar" class="bot-avatar">
            <span class="status-dot"></span>
          </div>
          <div class="text-group">
            <span class="bot-name">Chatbot SiaAgro</span>
            <span class="bot-status">En línea ahora</span>
          </div>
        </div>
      </div>

      <div class="header-actions">
        <button class="icon-only-btn" (click)="showConfig = !showConfig" title="Configurar API">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="config-panel" *ngIf="showConfig">
      <label>Endpoint del Backend:</label>
      <div class="config-input-group">
        <input [(ngModel)]="apiUrl" placeholder="Ex: http://localhost:8000/ask" />
        <button (click)="saveConfig()">Guardar</button>
      </div>
    </div>

    <main class="chat-window">
      <div *ngFor="let msg of messages"
        [ngClass]="{'user-msg': msg.sender === 'user', 'bot-msg': msg.sender === 'bot'}" class="message-row">
<!-- 
        <img *ngIf="msg.sender === 'bot'" src=""
          class="msg-avatar"> -->

        <div class="bubble">
          <span class="text">{{ msg.text }}</span>
          <div class="bubble-footer">
            <span class="time">{{ msg.timestamp | date:'shortTime' }}</span>
            <svg *ngIf="msg.sender === 'user'" class="check-icon" viewBox="0 0 24 24" width="12" height="12">
              <path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path>
            </svg>
          </div>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-container">
        <input [(ngModel)]="userInput" (keyup.enter)="send()" placeholder="Escribe un mensaje..." />
        <button class="send-btn" (click)="send()" [disabled]="!userInput.trim()">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </footer>
  </div>
</div>
